      { stepId: 's7-6', order: 6, title: '避免不必要的状态提升', unlockPolicy: 'linear' },
      { stepId: 's7-7', order: 7, title: '性能优化 checklist', unlockPolicy: 'linear' },
    ]},
    { chapterId: 'c8', order: 8, title: '生态与工程化', steps: [
      { stepId: 's8-1', order: 1, title: 'Create React App 到 Vite', unlockPolicy: 'linear' },
      { stepId: 's8-2', order: 2, title: 'React Router 路由基础', unlockPolicy: 'linear' },
      { stepId: 's8-3', order: 3, title: '单元测试与 Testing Library', unlockPolicy: 'linear' },
      { stepId: 's8-4', order: 4, title: 'ESLint 与代码规范', unlockPolicy: 'linear' },
      { stepId: 's8-5', order: 5, title: 'TypeScript 与 React 结合', unlockPolicy: 'linear' },
      { stepId: 's8-6', order: 6, title: '组件库与设计系统', unlockPolicy: 'linear' },
      { stepId: 's8-7', order: 7, title: '部署与生产环境优化', unlockPolicy: 'linear' },
    ]},
  ];

  const TOTAL_STEPS = chapters.reduce((n, c) => n + c.steps.length, 0);

  // UserProgress（登录学习者示例进度）
  const loggedInProgress = {
    completedStepIds: new Set([
      's1-1','s1-2','s1-3','s1-4','s1-5','s1-6','s1-7','s1-8',
      's2-1','s2-2','s2-3','s2-4','s2-5','s2-6','s2-7',
      's3-1','s3-2',
    ]),
    currentStepId: 's3-3',
    lastLearnedAt: '2026-07-16 21:42',
    syncStatus: 'synced',
  };

  // ---------------------------------------------------------------
  // 2. 状态
  // ---------------------------------------------------------------
  const state = {
    role: 'loggedIn', // guest | loggedIn | author
    searchKeyword: '',
    activeCategory: 'all',
    openChapters: new Set(),
  };

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => Array.from(document.querySelectorAll(sel));

  // ---------------------------------------------------------------
  // 3. 解锁状态计算（数据驱动，无主题分支）
  // ---------------------------------------------------------------
  function getFlatSteps() {
    const flat = [];
    chapters.forEach((ch, ci) => ch.steps.forEach((st, si) => flat.push({ ch, st, ci, si })));
    return flat;
  }

  function computeUnlockState(step, prevStep, completedSet, role) {
    const isCompleted = completedSet.has(step.stepId);
    const isCurrent = role === 'loggedIn' && step.stepId === loggedInProgress.currentStepId;

    if (role === 'author') {
      // 作者预览模式：全部可点击，但仍如实展示真实完成态供自查
      if (isCompleted) return 'completed';
      return 'preview-unlocked';
    }

    if (isCompleted) return 'completed';
    if (isCurrent) return 'current';

    if (role === 'guest') {
      const isFirstOfAll = !prevStep;
      return isFirstOfAll ? 'unlocked' : 'locked-guest';
    }

    // loggedIn 线性解锁
    if (step.unlockPolicy === 'free') return 'unlocked';
    if (!prevStep) return 'unlocked';
    return completedSet.has(prevStep.stepId) ? 'unlocked' : 'locked';
  }

  function buildDerivedTree() {
    const completedSet = state.role === 'loggedIn' ? loggedInProgress.completedStepIds : new Set();
    const flat = getFlatSteps();
    return chapters.map((ch, ci) => {
      const steps = ch.steps.map((st, si) => {
        const prev = si === 0 ? (ci === 0 ? null : chapters[ci - 1].steps[chapters[ci - 1].steps.length - 1]) : ch.steps[si - 1];
        const unlockState = computeUnlockState(st, prev, completedSet, state.role);
        return { ...st, unlockState };
      });
      const completedCount = steps.filter(s => s.unlockState === 'completed').length;
      const progressPercent = ch.steps.length ? Math.round((completedCount / ch.steps.length) * 100) : 0;
      return { ...ch, steps, completedCount, progressPercent };
    });
  }

  // ---------------------------------------------------------------
  // 4. 渲染：图标
  // ---------------------------------------------------------------
  const ICONS = {
    lock: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>`,
    circle: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="8"/></svg>`,
    check: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`,
    eye: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>`,
    chevron: `<svg class="chevron-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>`,
  };

  function stepIconHtml(unlockState) {
    switch (unlockState) {
      case 'completed':
        return `<span class="w-4 h-4 rounded-full bg-accent-400/15 border border-accent-400 text-accent-400 flex items-center justify-center shrink-0">${ICONS.check}</span>`;
      case 'current':
        return `<span class="step-dot w-4 h-4 rounded-full bg-primary-500 shadow-glow flex items-center justify-center shrink-0"></span>`;
      case 'preview-unlocked':
        return `<span class="w-4 h-4 rounded-full bg-spotlight/15 border border-spotlight/60 text-spotlight flex items-center justify-center shrink-0">${ICONS.eye}</span>`;
      case 'unlocked':
        return `<span class="w-4 h-4 rounded-full border border-white/25 text-text-secondary flex items-center justify-center shrink-0">${ICONS.circle}</span>`;
      case 'locked-guest':
      case 'locked':
      default:
        return `<span class="w-4 h-4 rounded-full bg-surface-2 border border-white/10 text-muted opacity-40 flex items-center justify-center shrink-0">${ICONS.lock}</span>`;
    }
  }

  function isClickable(unlockState) {
    return unlockState === 'completed' || unlockState === 'current' || unlockState === 'unlocked' || unlockState === 'preview-unlocked';
  }

  // ---------------------------------------------------------------
  // 5. 渲染：目录树
  // ---------------------------------------------------------------
  function matchesKeyword(text, kw) {
    if (!kw) return true;
    return text.toLowerCase().includes(kw.toLowerCase());
  }

  function renderTree() {
    const derived = buildDerivedTree();
    const kw = state.searchKeyword.trim();
    const treeList = $('#treeList');
    treeList.innerHTML = '';

    let anyMatch = false;

    derived.forEach((ch) => {
      const chapterMatches = matchesKeyword(ch.title, kw);
      const stepsFiltered = ch.steps.filter(st => chapterMatches || matchesKeyword(st.title, kw));
      const catFilterPass = state.activeCategory === 'all' || state.activeCategory === ch.chapterId;
      if (!catFilterPass) return;
      if (kw && stepsFiltered.length === 0 && !chapterMatches) return;
      anyMatch = true;

      const isOpen = state.openChapters.has(ch.chapterId);
      const chapterEl = document.createElement('div');
      chapterEl.className = 'rounded-lg overflow-hidden';

      const barColor = ch.progressPercent === 100 ? 'bg-accent-400' : 'bg-gradient-to-r from-primary-500 to-accent-400';

      chapterEl.innerHTML = `
        <button data-chapter="${ch.chapterId}" class="chapter-toggle w-full flex items-center gap-2 px-2.5 py-2 rounded-lg hover:bg-white/[.04] text-left">
          <span class="chevron-icon ${isOpen ? 'is-open' : ''}">${ICONS.chevron}</span>
          <span class="flex-1 min-w-0">
            <span class="text-xs font-semibold block truncate">${ch.order}. ${ch.title}</span>
            <span class="flex items-center gap-1.5 mt-1">
              <span class="flex-1 h-1 rounded-full bg-white/[.08] overflow-hidden max-w-[110px]">
                <span class="block h-full ${barColor} rounded-full" style="width:${ch.progressPercent}%"></span>
              </span>
              <span class="text-[10px] font-mono-ui text-muted whitespace-nowrap">${ch.completedCount}/${ch.steps.length}</span>
            </span>
          </span>
        </button>
        <div class="chapter-steps ${isOpen ? 'is-open' : ''}" data-chapter-body="${ch.chapterId}">
          <div class="pl-6 pr-1 pb-1.5 pt-0.5 space-y-0.5">
            ${(kw ? stepsFiltered : ch.steps).map(st => stepRowHtml(st, ch, kw)).join('')}
          </div>
        </div>
      `;
      treeList.appendChild(chapterEl);
    });

    $('#treeEmptyHint').classList.toggle('hidden', anyMatch);
    $('#resetFilterBtn').classList.toggle('hidden', !(kw || state.activeCategory !== 'all'));

    // 绑定折叠事件
    $$('.chapter-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.chapter;
        if (state.openChapters.has(id)) state.openChapters.delete(id);
        else state.openChapters.add(id);
        renderTree();
      });
    });

    // 绑定步骤点击
    $$('.step-row').forEach(row => {
      row.addEventListener('click', () => onStepClick(row.dataset.stepId));
    });
  }

  function highlightText(text, kw) {
    if (!kw) return text;
    const idx = text.toLowerCase().indexOf(kw.toLowerCase());
    if (idx === -1) return text;
    return text.slice(0, idx) + `<span class="highlight-match">${text.slice(idx, idx + kw.length)}</span>` + text.slice(idx + kw.length);
  }

  function stepRowHtml(st, ch, kw) {
    const clickable = isClickable(st.unlockState);
    const isCurrent = st.unlockState === 'current';
    const textColor = st.unlockState === 'locked' || st.unlockState === 'locked-guest' ? 'text-muted' : (isCurrent ? 'text-text-primary' : 'text-text-secondary');
    return `
      <div id="tree-${st.stepId}" data-step-id="${st.stepId}" class="step-row ${clickable ? '' : 'is-locked'} ${isCurrent ? 'is-current' : ''} flex items-center gap-2 px-2 py-1.5 rounded-md ${isCurrent ? 'bg-primary-500/10 ring-1 ring-primary-500/40' : ''}">
        ${stepIconHtml(st.unlockState)}
        <span class="step-title text-xs ${textColor} truncate flex-1">${st.order}. ${highlightText(st.title, kw)}</span>
        ${isCurrent ? '<span class="text-[9px] font-semibold px-1.5 py-0.5 rounded-full bg-primary-500 text-white shrink-0">当前</span>' : ''}
      </div>
    `;
  }

  // ---------------------------------------------------------------
  // 6. 渲染：章节卡片网格
  // ---------------------------------------------------------------
  function renderChapterCards() {
    const derived = buildDerivedTree();
    const grid = $('#chapterCardsGrid');
    grid.innerHTML = derived.map(ch => {
      const isCurrentChapter = ch.steps.some(s => s.unlockState === 'current');
      const isDone = ch.progressPercent === 100;
      const stateLabel = isDone ? '已完成' : (isCurrentChapter ? '进行中' : (ch.completedCount > 0 ? '部分完成' : '未开始'));
      const stateColor = isDone ? 'text-accent-400 bg-accent-400/10 border-accent-400/30'
        : isCurrentChapter ? 'text-primary-300 bg-primary-500/10 border-primary-500/30'
        : ch.completedCount > 0 ? 'text-secondary bg-white/[.05] border-white/10'
        : 'text-muted bg-white/[.03] border-white/10';
      return `
        <button data-jump-chapter="${ch.chapterId}" class="glass-card no-hover-lift hover:!border-primary-500/40 hover:!shadow-glow hover:!-translate-y-0.5 text-left p-4 group">
          <div class="flex items-start justify-between mb-2.5">
            <span class="text-[10px] font-mono-ui text-muted">CH.${String(ch.order).padStart(2,'0')}</span>
            <span class="text-[10px] font-medium px-1.5 py-0.5 rounded-full border ${stateColor}">${stateLabel}</span>
          </div>
          <h3 class="text-sm font-semibold mb-2.5 truncate group-hover:text-accent-400">${ch.title}</h3>
          <div class="flex items-center gap-2">
            <span class="flex-1 h-1.5 rounded-full bg-white/[.08] overflow-hidden">
              <span class="block h-full grad-primary-accent rounded-full" style="width:${ch.progressPercent}%"></span>
            </span>
            <span class="text-[11px] font-mono-ui text-secondary whitespace-nowrap">${ch.completedCount}/${ch.steps.length}</span>
          </div>
        </button>
      `;
    }).join('');

    $$('[data-jump-chapter]').forEach(btn => {
      btn.addEventListener('click', () => jumpToChapter(btn.dataset.jumpChapter));
    });
  }

  function jumpToChapter(chapterId) {
    state.openChapters.add(chapterId);
    renderTree();
    openDrawerIfMobile();
    requestAnimationFrame(() => {
      const el = $(`[data-chapter-body="${chapterId}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }

  // ---------------------------------------------------------------
  // 7. 分类筛选 chips
  // ---------------------------------------------------------------
  function renderCategoryChips() {
    const wrap = $('#categoryChips');
    const items = [{ id: 'all', title: '全部' }, ...chapters.map(c => ({ id: c.chapterId, title: c.title }))];
    wrap.innerHTML = items.map(c => `
      <button data-cat="${c.id}" class="cat-chip text-[11px] px-2.5 py-1 rounded-full border transition-colors ${state.activeCategory === c.id ? 'bg-primary-500/15 border-primary-500/50 text-primary-200' : 'border-white/10 text-secondary hover:bg-white/5'}">${c.title}</button>
    `).join('');
    $$('.cat-chip').forEach(btn => btn.addEventListener('click', () => {
      state.activeCategory = btn.dataset.cat;
      if (state.activeCategory !== 'all') state.openChapters.add(state.activeCategory);
      renderCategoryChips();
      renderTree();
    }));
  }

  // ---------------------------------------------------------------
  // 8. 顶部信息条：完成度环、角色态、同步状态
  // ---------------------------------------------------------------
  let ringChartInstance = null;
  function renderTopBar() {
    const completedSet = state.role === 'loggedIn' ? loggedInProgress.completedStepIds : new Set();
    const completedCount = completedSet.size;
    const percent = state.role === 'author' ? 0 : Math.round((completedCount / TOTAL_STEPS) * 100);

    $('#completionText').textContent = state.role === 'author' ? '预览' : `${percent}%`;
    $('#previewBadge').classList.toggle('hidden', state.role !== 'author');
    $('#guestBadge').classList.toggle('hidden', state.role !== 'guest');

    // 环形图
    const el = $('#ringChart');
    if (!ringChartInstance) ringChartInstance = echarts.init(el, null, { renderer: 'svg' });
    const ringPercent = state.role === 'author' ? 100 : percent;
    const ringColor = state.role === 'author' ? '#FDBA33' : undefined;
    ringChartInstance.setOption({
      backgroundColor: 'transparent',
      series: [{
        type: 'pie',
        radius: ['70%', '92%'],
        startAngle: 90,
        silent: true,
        label: { show: false },
        labelLine: { show: false },
        data: [
          { value: ringPercent, itemStyle: { color: ringColor || { type: 'linear', x:0,y:0,x2:1,y2:1, colorStops: [{offset:0,color:'#4C6FFF'},{offset:1,color:'#22D3EE'}] } } },
          { value: 100 - ringPercent, itemStyle: { color: 'rgba(255,255,255,.08)' }, emphasis: { disabled: true } },
        ],
      }],
    });

    // 登录/角色相关按钮
    $('#loginCta').classList.toggle('hidden', state.role !== 'guest');
    $('#userChip').classList.toggle('hidden', state.role === 'guest');
    $('#userChip').classList.toggle('flex', state.role !== 'guest');

    // 同步状态 pill
    const syncEl = $('#syncPill');
    syncEl.classList.remove('hidden');
    if (state.role === 'loggedIn') {
      syncEl.className = 'hidden sm:flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full border border-success/30 bg-success/10 text-success';
      syncEl.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-success"></span>已同步`;
    } else if (state.role === 'guest') {
      syncEl.className = 'hidden sm:flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full border border-white/10 bg-white/[.04] text-secondary';
      syncEl.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-muted"></span>本地保存`;
    } else {
      syncEl.className = 'hidden sm:flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full border border-spotlight/30 bg-spotlight/10 text-spotlight';
      syncEl.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-spotlight"></span>不写入进度`;
    }
  }

  // ---------------------------------------------------------------
  // 9. 继续学习卡 / 统计
  // ---------------------------------------------------------------
  function renderContinueCard() {
    const derived = buildDerivedTree();
    const completedSet = state.role === 'loggedIn' ? loggedInProgress.completedStepIds : new Set();
    const completedCount = completedSet.size;
    const doneChapters = derived.filter(c => c.progressPercent === 100).length;

    $('#statCompleted').textContent = completedCount;
    $('#statChapters').textContent = `${doneChapters}/8`;

    const roleNote = $('#roleNote');

    if (state.role === 'guest') {
      const first = chapters[0].steps[0];
      $('#continueLabel').textContent = '开始你的第一步';
      $('#continueChapterTitle').textContent = chapters[0].title;
      $('#continueStepTitle').textContent = first.title;
      $('#continueBtnText').textContent = '开始学习';
      $('#lastLearnedText').textContent = '游客模式 · 进度仅保存在本机';
      roleNote.className = 'relative mt-4 text-xs px-3 py-2 rounded-lg border border-white/10 bg-white/[.03] text-secondary';
      roleNote.textContent = '游客仅可进入第一章第一步，其余步骤登录后解锁；本地进度登录后将与账号进度自动合并。';
      roleNote.classList.remove('hidden');
      $('#continueBtn').onclick = () => onStepClick(first.stepId);
    } else if (state.role === 'author') {
      const first = chapters[0].steps[0];
      $('#continueLabel').textContent = '预览模式';
      $('#continueChapterTitle').textContent = chapters[0].title;
      $('#continueStepTitle').textContent = first.title;
      $('#continueBtnText').textContent = '进入预览';
      $('#lastLearnedText').textContent = '内容自查模式';
      roleNote.className = 'relative mt-4 text-xs px-3 py-2 rounded-lg border border-spotlight/30 bg-spotlight/10 text-spotlight';
      roleNote.textContent = '预览模式：所有步骤均可点击跳转，用于内容自查；本次浏览不计入学习进度，不写入 UserProgress。';
      roleNote.classList.remove('hidden');
      $('#continueBtn').onclick = () => onStepClick(first.stepId);
    } else {
      const curId = loggedInProgress.currentStepId;
      let curChapter = chapters[0], curStep = chapters[0].steps[0];
      chapters.forEach(ch => ch.steps.forEach(st => { if (st.stepId === curId) { curChapter = ch; curStep = st; } }));
      $('#continueLabel').textContent = '当前学习到';
      $('#continueChapterTitle').textContent = curChapter.title;
      $('#continueStepTitle').textContent = curStep.title;
      $('#continueBtnText').textContent = '继续学习';
      $('#lastLearnedText').textContent = `上次学习：${loggedInProgress.lastLearnedAt}`;
      roleNote.classList.add('hidden');
      $('#continueBtn').onclick = () => onStepClick(curId);
    }
  }

  // ---------------------------------------------------------------
  // 10. 步骤点击交互
  // ---------------------------------------------------------------
  function onStepClick(stepId) {
    const derived = buildDerivedTree();
    let target = null, chapter = null;
    derived.forEach(ch => ch.steps.forEach(st => { if (st.stepId === stepId) { target = st; chapter = ch; } }));
    if (!target) return;

    if (isClickable(target.unlockState)) {
      if (target.unlockState === 'preview-unlocked') {
        showToast(`预览模式跳转：${chapter.title} · ${target.title}`, 'spotlight');
      } else {
        showToast(`进入「${target.title}」`, 'success');
      }
      // 真实原型中跳转至引导引擎工作台，携带 stepId
      window.location.href = `guided-tour__tutorial-workspace.html?packageId=react&stepId=${encodeURIComponent(stepId)}`;
      return;
    }

    // 未解锁：弹出提示
    if (state.role === 'guest') {
      openPromptModal({
        icon: 'lock', color: 'spotlight',
        title: '登录后解锁完整教程',
        desc: `「${target.title}」尚未解锁。游客仅可体验第一章第一步，登录后即可按顺序解锁全部 ${TOTAL_STEPS} 个步骤，并支持跨端同步学习进度。`,
        actionText: '去登录', action: () => { window.location.href = 'learning-progress__auth-entry.html'; },
      });
    } else {
      openPromptModal({
        icon: 'lock', color: 'warning',
        title: '该步骤尚未解锁',
        desc: `请先完成「${chapter.title}」中此前的步骤，「${target.title}」将自动解锁。你也可以在目录中查看已解锁的其他步骤。`,
      });
    }
  }

  function openPromptModal({ icon, color, title, desc, actionText, action }) {
    const modal = $('#promptModal');
    const iconWrap = $('#promptIconWrap');
    const colorMap = {
      spotlight: 'bg-spotlight/15 text-spotlight border border-spotlight/40',
      warning: 'bg-warning/15 text-warning border border-warning/40',
    };
    iconWrap.className = `w-11 h-11 rounded-xl flex items-center justify-center mb-3 ${colorMap[color] || colorMap.warning}`;
    iconWrap.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>`;
    $('#promptTitle').textContent = title;
    $('#promptDesc').textContent = desc;
    const actionBtn = $('#promptActionBtn');
    if (actionText) {
      actionBtn.textContent = actionText;
      actionBtn.classList.remove('hidden');
      actionBtn.onclick = () => { closePromptModal(); action && action(); };
    } else {
      actionBtn.classList.add('hidden');
    }
    modal.classList.remove('hidden');
  }
  function closePromptModal() { $('#promptModal').classList.add('hidden'); }
  $('#promptCancelBtn').addEventListener('click', closePromptModal);
  $('#promptModal').addEventListener('click', (e) => { if (e.target.id === 'promptModal') closePromptModal(); });

  // ---------------------------------------------------------------
  // 11. Toast
  // ---------------------------------------------------------------
  function showToast(msg, type) {
    const colorMap = {
      success: 'border-success/40 bg-success/10 text-success',
      spotlight: 'border-spotlight/40 bg-spotlight/10 text-spotlight',
      info: 'border-white/10 bg-surface-2 text-text-primary',
    };
    const el = document.createElement('div');
    el.className = `toast-enter pointer-events-auto text-xs font-medium px-3.5 py-2 rounded-lg border shadow-lg ${colorMap[type] || colorMap.info}`;
    el.textContent = msg;
    $('#toastContainer').appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(-8px)'; setTimeout(() => el.remove(), 220); }, 2200);
  }

  // ---------------------------------------------------------------
  // 12. 移动端抽屉
  // ---------------------------------------------------------------
  function openDrawerIfMobile() {
    if (window.innerWidth >= 1024) return;
    $('#treePanel').classList.add('drawer-open');
    $('#drawerBackdrop').classList.remove('hidden');
  }
  function closeDrawer() {
    $('#treePanel').classList.remove('drawer-open');
    $('#drawerBackdrop').classList.add('hidden');
  }
  $('#openDrawerBtn').addEventListener('click', openDrawerIfMobile);
  $('#closeDrawerBtn').addEventListener('click', closeDrawer);
  $('#drawerBackdrop').addEventListener('click', closeDrawer);

  // ---------------------------------------------------------------
  // 13. 搜索
  // ---------------------------------------------------------------
  $('#searchInput').addEventListener('input', (e) => {
    state.searchKeyword = e.target.value;
    if (state.searchKeyword.trim()) {
      chapters.forEach(c => state.openChapters.add(c.chapterId));
    }
    renderTree();
  });
  $('#resetFilterBtn').addEventListener('click', () => {
    state.searchKeyword = '';
    state.activeCategory = 'all';
    $('#searchInput').value = '';
    renderCategoryChips();
    renderTree();
  });

  // ---------------------------------------------------------------
  // 14. 角色切换
  // ---------------------------------------------------------------
  $('#roleSwitcher').addEventListener('change', (e) => {
    state.role = e.target.value;
    state.openChapters = new Set();
    autoExpandCurrent();
    renderAll();
    showToast(
      state.role === 'guest' ? '已切换为「游客」视角' : state.role === 'author' ? '已切换为「作者预览」视角' : '已切换为「登录学习者」视角',
      'info'
    );
  });

  // ---------------------------------------------------------------
  // 15. 站点地图下拉
  // ---------------------------------------------------------------
  const siteMap = [
    { group: '教程与章节目录', items: [
      { title: '主题包选择页', href: 'tutorial-catalog__package-selection.html' },
      { title: '教程详情页（目录树+概览）', href: 'tutorial-catalog__chapter-tree.html', current: true },
      { title: '我的学习总览页', href: 'tutorial-catalog__learning-progress-overview.html' },
    ]},
    { group: '课程讲解与步骤导航', items: [
      { title: '教程包目录', href: 'lesson-reader__catalog.html' },
      { title: '课程学习页', href: 'lesson-reader__lesson.html' },
      { title: '我的学习进度', href: 'lesson-reader__my-progress.html' },
    ]},
    { group: '引导引擎', items: [
      { title: '引导蒙层与聚光灯', href: 'guided-tour__tour-overlay.html' },
      { title: '教程学习工作台', href: 'guided-tour__tutorial-workspace.html' },
      { title: '章节/步骤目录树', href: 'guided-tour__chapter-toc.html' },
      { title: '教程包（主题）选择页', href: 'guided-tour__tutorial-catalog.html' },
      { title: '我的学习进度页', href: 'guided-tour__my-progress.html' },
    ]},
    { group: '代码沙箱', items: [
      { title: '沙箱主面板', href: 'code-sandbox__sandbox-panel.html' },
      { title: '移动端沙箱 Tab 视图', href: 'code-sandbox__sandbox-mobile-tab.html' },
      { title: '沙箱异常态视图', href: 'code-sandbox__sandbox-error-state.html' },
    ]},
    { group: '学习进度与账户', items: [
      { title: '登录入口与登录弹窗', href: 'learning-progress__auth-entry.html' },
      { title: '我的学习', href: 'learning-progress__my-learning.html' },
      { title: '进度标记与同步状态', href: 'learning-progress__progress-indicators.html' },
    ]},
  ];
  function renderSiteMap() {
    $('#siteMapPanel').innerHTML = siteMap.map(g => `
      <div class="mb-3 last:mb-0">
        <p class="text-[10px] uppercase tracking-wide text-muted px-2 mb-1">${g.group}</p>
        ${g.items.map(it => `
          <a href="${it.href}" class="block px-2 py-1.5 rounded-md text-xs ${it.current ? 'bg-primary-500/15 text-primary-200 font-semibold' : 'text-secondary hover:bg-white/5 hover:text-text-primary'}">${it.title}${it.current ? ' · 当前' : ''}</a>
        `).join('')}
      </div>
    `).join('');
  }
  $('#siteMapBtn').addEventListener('click', () => $('#siteMapPanel').classList.toggle('hidden'));
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#siteMapBtn') && !e.target.closest('#siteMapPanel')) $('#siteMapPanel').classList.add('hidden');
  });

  // ---------------------------------------------------------------
  // 16. 初始化：自动展开并滚动到当前步骤
  // ---------------------------------------------------------------
  function autoExpandCurrent() {
    if (state.role === 'loggedIn') {
      const curId = loggedInProgress.currentStepId;
      chapters.forEach(ch => { if (ch.steps.some(s => s.stepId === curId)) state.openChapters.add(ch.chapterId); });
    } else {
      state.openChapters.add(chapters[0].chapterId);
    }
  }

  function renderAll() {
    renderTopBar();
    renderCategoryChips();
    renderTree();
    renderChapterCards();
    renderContinueCard();
  }

  window.addEventListener('resize', () => { if (ringChartInstance) ringChartInstance.resize(); });

  renderSiteMap();
  autoExpandCurrent();
  renderAll();

  requestAnimationFrame(() => {
    const curEl = document.querySelector('.step-row.is-current');
    if (curEl) curEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
})();
</script>
