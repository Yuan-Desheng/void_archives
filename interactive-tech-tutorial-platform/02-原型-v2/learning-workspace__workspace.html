  .mdx h2:first-child { margin-top: 0; }

  .mdx ul { list-style: disc; padding-left: 1.25rem; margin: .75rem 0; font-size: .9375rem; line-height: 1.7; }
  .mdx li { margin: .25rem 0; }
  .mdx strong { font-weight: 600; }

/* =========================================================================
   数据模型: TutorialPackage（拟真数据 —— React 主题 1-2 章）
   ========================================================================= */
function hl(raw) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const KW = ['import','from','export','default','const','let','var','function','return','if','else','for','while','new','class','extends','this','typeof','instanceof','of','in','true','false','null','undefined','async','await'];
  const re = /\/\/[^\n]*|\/\*[\s\S]*?\*\/|'(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|<\/?[A-Za-z][\w.]*>?|\b[A-Za-z_$][\w$]*\b|\b\d+(?:\.\d+)?\b|[\s\S]/g;
  const tokens = raw.match(re) || [];
  let out = '';
  for (const t of tokens) {
    if (t.startsWith('//') || t.startsWith('/*')) out += `<span class="tok-com">${esc(t)}</span>`;
    else if (t[0] === "'" || t[0] === '"') out += `<span class="tok-str">${esc(t)}</span>`;
    else if (t[0] === '<') out += `<span class="tok-tag">${esc(t)}</span>`;
    else if (KW.includes(t)) out += `<span class="tok-kw">${esc(t)}</span>`;
    else if (/^\d/.test(t)) out += `<span class="tok-num">${esc(t)}</span>`;
    else out += esc(t);
  }
  return out;
}
function codeBlock(code, filename) {
  return `<div class="code-block"><div class="code-block-head"><span>${filename || 'JSX'}</span></div><pre><code>${hl(code)}</code></pre></div>`;
}

const tutorialPackage = {
  id: 'react',
  meta: {
    title: 'React 入门教程',
    description: '从 JSX 到 Hooks，跟着示例边读边写',
    language: 'jsx',
    defaultCode: {
      'App.js': 'function App() {\n  return <h1>Hello, React!</h1>;\n}',
      'styles.css': 'body { font-family: sans-serif; }'
    }
  },
  chapters: [
    {
      id: 'ch1', title: 'React 基础',
      steps: [
        {
          id: 's1-1', title: 'JSX 是什么',
          description: () => `
            <p>JSX 是 React 里描述界面结构的语法糖——长得像 HTML，但本质上是 <code class="inline">React.createElement(...)</code> 的语法糖，会被 Babel 编译成普通 JS 函数调用。</p>
            <ul>
              <li>可以在 <code class="inline">{}</code> 中嵌入任意 JS 表达式，比如变量、函数调用</li>
              <li>JSX 元素必须有且只有一个根节点，多个并列节点要用 <code class="inline">&lt;&gt;...&lt;/&gt;</code>（Fragment）包裹</li>
              <li>属性名用小驼峰，比如 <code class="inline">onClick</code>、<code class="inline">className</code></li>
            </ul>
            ${codeBlock(
`function Greeting({ name }) {
  return (
    <div className="card">
      <h1>你好，{name}</h1>
      <p>这是你的第一个 JSX 元素。</p>
    </div>
  );
}`, 'App.js')}
            <div class="tip"><b>提示：</b>JSX 里的 <code class="inline">class</code> 要写成 <code class="inline">className</code>，因为 <code class="inline">class</code> 是 JS 的保留字。</div>
          `,
          files: {
            'App.js': `function Greeting({ name }) {
  return (
    <div className="card">
      <h1>你好，{name}</h1>
      <p>这是你的第一个 JSX 元素。</p>
    </div>
  );

/* =========================================================================
   运行时状态与工具
   ========================================================================= */
const flatSteps = [];
tutorialPackage.chapters.forEach(ch => ch.steps.forEach(st => flatSteps.push({ chapterId: ch.id, chapterTitle: ch.title, step: st })));
const totalStepCount = flatSteps.length;

const state = {
  currentChapterId: null,
  currentStepId: null,
  globalStepIndex: 0,
  activeMobilePane: 'explain',
  sandboxByStep: {},   // stepId -> { activeFile, files, isShowingAnswer, ownSnapshot }
};

function findFlatIndexByIds(chapterId, stepId) {
  return flatSteps.findIndex(f => f.chapterId === chapterId && f.step.id === stepId);
}

function getSandboxState(stepId) {
  const flat = flatSteps[state.globalStepIndex];
  if (!state.sandboxByStep[stepId]) {
    const files = flat.step.files || tutorialPackage.meta.defaultCode;
    state.sandboxByStep[stepId] = {
      activeFile: Object.keys(files)[0],
      files: JSON.parse(JSON.stringify(files)),
      isShowingAnswer: false,
      ownSnapshot: null
    };
  }
  return state.sandboxByStep[stepId];
}

/* ---------- localStorage 模拟 learning-progress ---------- */
const LS_KEY = 'ittp:progress';
function readProgress() {
  try {
    const raw = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    return raw[tutorialPackage.id] || null;
  } catch (e) { return null; }
}
function writeProgress(chapterId, stepId) {
  try {
    const raw = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    const prev = raw[tutorialPackage.id] || { completedStepIds: [] };
    raw[tutorialPackage.id] = {
      currentStepId: stepId,
      currentChapterId: chapterId,
      completedStepIds: prev.completedStepIds || [],
      lastVisitedAt: Date.now()
    };
    localStorage.setItem(LS_KEY, JSON.stringify(raw));
  } catch (e) { /* localStorage 不可用时静默降级为会话内记忆 */ }
}
function markCompleted(stepId) {
  try {
    const raw = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    const prev = raw[tutorialPackage.id] || { completedStepIds: [] };
    if (!prev.completedStepIds.includes(stepId)) prev.completedStepIds.push(stepId);
    raw[tutorialPackage.id] = prev;
    localStorage.setItem(LS_KEY, JSON.stringify(raw));
  } catch (e) {}
}
function getCompletedSet() {
  const p = readProgress();
  return new Set(p && p.completedStepIds ? p.completedStepIds : []);
}

/* ---------- Toast ---------- */
function showToast(msg) {
  const host = document.getElementById('toastHost');
  const el = document.createElement('div');
  el.className = 'toast-in surface rounded-lg shadow-md border px-4 py-2 text-sm font-medium';
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2600);
}

/* ---------- URL 深链 ---------- */
function readUrlLocation() {
  const p = new URLSearchParams(location.search);
  const chapterId = p.get('chapter');
  const stepId = p.get('step');
  if (chapterId && stepId) {
    const idx = findFlatIndexByIds(chapterId, stepId);
    if (idx >= 0) return idx;
    return -1; // 无效深链
  }
  return null; // 无深链
}
function writeUrlLocation(chapterId, stepId, replace) {
  const p = new URLSearchParams(location.search);
  p.set('chapter', chapterId);
  p.set('step', stepId);
  const url = location.pathname + '?' + p.toString();
  if (replace) history.replaceState({ chapterId, stepId }, '', url);
  else history.pushState({ chapterId, stepId }, '', url);
}

function renderSidebar() {
  const tree = document.getElementById('dirTree');
  tree.innerHTML = '';
  const completed = getCompletedSet();
  tutorialPackage.chapters.forEach(ch => {
    const head = document.createElement('div');
    head.className = 'px-2 pt-3 pb-1 text-xs font-semibold uppercase tracking-wide';
    head.style.color = 'var(--color-text-muted)';
    head.textContent = ch.title;
    tree.appendChild(head);
    ch.steps.forEach(st => {
      const isCurrent = ch.id === state.currentChapterId && st.id === state.currentStepId;
      const isDone = completed.has(st.id);
      const row = document.createElement('button');
      row.className = 'w-full text-left px-2.5 py-2 rounded-lg text-sm flex items-center gap-2 mb-0.5 border-l-[3px]';
      row.style.borderLeftColor = isCurrent ? 'var(--color-primary)' : 'transparent';
      if (isCurrent) { row.style.background = 'color-mix(in srgb, var(--color-primary) 10%, transparent)'; row.style.color = 'var(--color-primary)'; row.style.fontWeight = '500'; }
      row.onmouseenter = () => { if (!isCurrent) row.style.background = 'color-mix(in srgb, var(--color-text-muted) 12%, transparent)'; };
      row.onmouseleave = () => { if (!isCurrent) row.style.background = 'transparent'; };
      row.innerHTML = `
        <span class="w-4 h-4 rounded-full flex items-center justify-center shrink-0" style="${isDone ? 'background:var(--color-primary)' : 'border:1.5px solid var(--color-border)'}">
          ${isDone ? '<svg class="w-2.5 h-2.5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>' : ''}
        </span>
        <span class="truncate">${st.title}</span>
      `;
      row.addEventListener('click', () => {
        goToStep(ch.id, st.id, true);
        closeDrawer();
      });
      tree.appendChild(row);
    });
  });
}

function renderStepDots() {
  const host = document.getElementById('stepDots');
  host.innerHTML = '';
  const completed = getCompletedSet();
  flatSteps.forEach((f, i) => {
    const dot = document.createElement('span');
    const isCurrent = i === state.globalStepIndex;
    const isDone = completed.has(f.step.id) && !isCurrent;
    dot.className = 'w-2 h-2 rounded-full ' + (isCurrent ? 'dot-current' : isDone ? 'dot-done' : 'dot-todo');
    host.appendChild(dot);
  });
}

function renderFileTabs(stepId) {
  const sbx = getSandboxState(stepId);
  const host = document.getElementById('fileTabs');
  host.innerHTML = '';
  Object.keys(sbx.files).forEach(fname => {
    const btn = document.createElement('button');
    const active = fname === sbx.activeFile;
    btn.className = 'px-3 py-1.5 rounded-lg text-xs font-mono whitespace-nowrap shrink-0';
    btn.style.background = active ? 'var(--color-primary)' : 'transparent';
    btn.style.color = active ? '#fff' : 'var(--color-text-muted)';
    btn.textContent = fname;
    btn.addEventListener('click', () => {
      sbx.activeFile = fname;
      renderFileTabs(stepId);
      renderEditor(stepId);
    });
    host.appendChild(btn);
  });
}

function renderEditor(stepId) {
  const sbx = getSandboxState(stepId);
  const ta = document.getElementById('codeEditor');
  ta.value = sbx.files[sbx.activeFile] || '';
  ta.oninput = () => { sbx.files[sbx.activeFile] = ta.value; };
  document.getElementById('answerBanner').classList.toggle('hidden', !sbx.isShowingAnswer);

  const flat = flatSteps[state.globalStepIndex];
  const hasSolution = !!flat.step.solution;
  const answerBtn = document.getElementById('answerBtn');
  if (sbx.isShowingAnswer) {
    answerBtn.textContent = '切回我的代码';
    answerBtn.disabled = false;
    answerBtn.style.opacity = '1';
    answerBtn.style.cursor = 'pointer';
  } else if (!hasSolution) {
    answerBtn.textContent = '给我看答案';
    answerBtn.disabled = true;
    answerBtn.style.opacity = '.45';
    answerBtn.style.cursor = 'not-allowed';
  } else {
    answerBtn.textContent = '给我看答案';
    answerBtn.disabled = false;
    answerBtn.style.opacity = '1';
    answerBtn.style.cursor = 'pointer';
  }

  document.getElementById('previewArea').innerHTML = '<p class="text-sm text-slate-400">点击「运行」查看效果</p>';
}

function renderPreview(stepId) {
  const flat = flatSteps[state.globalStepIndex];
  const sbx = getSandboxState(stepId);
  const previewData = sbx.isShowingAnswer ? (flat.step.previewSolution || flat.step.preview) : flat.step.preview;

    card.className = 'border rounded-xl px-4 py-3 text-sm w-full max-w-xs';
    card.style.borderColor = '#e2e8f0';
    card.innerHTML = `<h1 class="font-bold text-base mb-1">${previewData.title || ''}</h1><p class="text-slate-500">${previewData.body || ''}</p>`;
    area.appendChild(card);
  }
}

function clearPreviewTimer() {
  const area = document.getElementById('previewArea');
  if (area.dataset.timerId) { clearInterval(Number(area.dataset.timerId)); delete area.dataset.timerId; }
}

function renderStep() {
  const flat = flatSteps[state.globalStepIndex];
  state.currentChapterId = flat.chapterId;
  state.currentStepId = flat.step.id;

  document.getElementById('infoBarTutorialTitle').textContent = tutorialPackage.meta.title;
  document.getElementById('infoBarChapterTitle').textContent = flat.chapterTitle;
  document.getElementById('infoBarStepBadge').textContent = (state.globalStepIndex + 1) + ' / ' + totalStepCount;
  document.getElementById('stepOrderBadge').textContent = '步骤 ' + (state.globalStepIndex + 1);
  document.getElementById('stepTitle').textContent = flat.step.title;
  document.getElementById('mdxContent').innerHTML = flat.step.description();
  document.getElementById('footerStepText').textContent = '第 ' + (state.globalStepIndex + 1) + ' 步 / 共 ' + totalStepCount + ' 步';

  document.getElementById('prevBtn').disabled = state.globalStepIndex === 0;
  document.getElementById('prevBtn').style.opacity = state.globalStepIndex === 0 ? '.5' : '1';
  document.getElementById('prevBtn').style.cursor = state.globalStepIndex === 0 ? 'not-allowed' : 'pointer';

  const isLast = state.globalStepIndex === totalStepCount - 1;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = isLast;
  nextBtn.style.opacity = isLast ? '.5' : '1';
  nextBtn.style.cursor = isLast ? 'not-allowed' : 'pointer';
  nextBtn.querySelector('span').textContent = isLast ? '已经是最后一步' : '下一步';

  clearPreviewTimer();
  renderFileTabs(flat.step.id);
  renderEditor(flat.step.id);
  renderSidebar();
  renderStepDots();
  document.getElementById('explainPane').scrollTop = 0;

  // stepEnteredEvent -> learning-progress
  writeProgress(flat.chapterId, flat.step.id);
}

function goToStep(chapterId, stepId, isJump) {
  const idx = findFlatIndexByIds(chapterId, stepId);
  if (idx < 0) return;
  state.globalStepIndex = idx;
  renderStep();
  writeUrlLocation(chapterId, stepId, false);
}

/* =========================================================================
   交互绑定
   ========================================================================= */
let navLock = false;
document.getElementById('prevBtn').addEventListener('click', () => {
  if (navLock || state.globalStepIndex === 0) return;
  navLock = true;
  state.globalStepIndex--;
  renderStep();
  const flat = flatSteps[state.globalStepIndex];
  writeUrlLocation(flat.chapterId, flat.step.id, false);
  setTimeout(() => navLock = false, 250);
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if (navLock) return;
  if (state.globalStepIndex >= totalStepCount - 1) {
    showToast('已经是整个教程包的最后一步啦');
    return;
  }
  navLock = true;
  markCompleted(flatSteps[state.globalStepIndex].step.id);
  state.globalStepIndex++;
  renderStep();
  const flat = flatSteps[state.globalStepIndex];
  writeUrlLocation(flat.chapterId, flat.step.id, false);
  setTimeout(() => navLock = false, 250);
});

document.getElementById('runBtn').addEventListener('click', () => {
  const btn = document.getElementById('runBtn');
  const icon = document.getElementById('runIcon');
  const text = document.getElementById('runBtnText');
  btn.disabled = true;
  icon.classList.add('spin');
  text.textContent = '运行中';
  document.getElementById('previewArea').innerHTML = '<p class="text-sm text-slate-400">编译打包中…</p>';
  clearPreviewTimer();
  setTimeout(() => {
    icon.classList.remove('spin');
    text.textContent = '运行';
    btn.disabled = false;
    renderPreview(state.currentStepId);
  }, 500);
});

document.getElementById('answerBtn').addEventListener('click', () => {
  const stepId = state.currentStepId;
  const flat = flatSteps[state.globalStepIndex];
  const sbx = getSandboxState(stepId);
  if (sbx.isShowingAnswer) {
    sbx.files = sbx.ownSnapshot;
    sbx.ownSnapshot = null;
    sbx.isShowingAnswer = false;
  } else {
    if (!flat.step.solution) return;
    sbx.ownSnapshot = JSON.parse(JSON.stringify(sbx.files));
    sbx.files = JSON.parse(JSON.stringify(flat.step.solution));
    sbx.isShowingAnswer = true;
  }
  renderFileTabs(stepId);
  renderEditor(stepId);
  document.getElementById('runBtn').click();
});

document.getElementById('revertBtn').addEventListener('click', () => {
  document.getElementById('answerBtn').click();
});

/* 移动端 讲解/代码 Tab 切换 (F9) */
document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.activeMobilePane = btn.dataset.pane;
    document.querySelectorAll('.mobile-tab-btn').forEach(b => {
      const active = b === btn;
      b.dataset.active = active ? 'true' : 'false';
      b.style.background = active ? 'var(--color-primary)' : 'transparent';
      b.style.color = active ? '#fff' : 'var(--color-text)';
      b.style.borderColor = active ? 'var(--color-primary)' : 'var(--color-border)';
    });
    document.getElementById('explainPane').classList.toggle('hidden', state.activeMobilePane !== 'explain');
    document.getElementById('sandboxPane').classList.toggle('hidden', state.activeMobilePane !== 'sandbox');
  });
});
document.querySelector('.mobile-tab-btn[data-pane="explain"]').click();

/* xl 断点以上恢复双栏显示（移除 mobile hidden 影响） */
function syncPaneVisibilityForBreakpoint() {
  if (window.innerWidth >= 768) {
    document.getElementById('explainPane').classList.remove('hidden');
    document.getElementById('sandboxPane').classList.remove('hidden');
  } else {
    document.getElementById('explainPane').classList.toggle('hidden', state.activeMobilePane !== 'explain');
    document.getElementById('sandboxPane').classList.toggle('hidden', state.activeMobilePane !== 'sandbox');
  }
}
window.addEventListener('resize', syncPaneVisibilityForBreakpoint);

/* 抽屉目录 */
function openDrawer() {
  document.getElementById('dirSidebar').classList.add('drawer-open');
  document.getElementById('drawerBackdrop').classList.remove('hidden');
}
function closeDrawer() {
  document.getElementById('dirSidebar').classList.remove('drawer-open');
  document.getElementById('drawerBackdrop').classList.add('hidden');
}
document.getElementById('drawerToggleBtn').addEventListener('click', openDrawer);
document.getElementById('drawerCloseBtn').addEventListener('click', closeDrawer);
document.getElementById('drawerBackdrop').addEventListener('click', closeDrawer);

/* 顶部站点导航下拉 */
document.querySelectorAll('.nav-toggle').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const key = btn.dataset.menu;
    document.querySelectorAll('[data-menu-panel]').forEach(p => {
      p.classList.toggle('hidden', p.dataset.menuPanel !== key || !p.classList.contains('hidden') === false ? p.dataset.menuPanel !== key : false);
    });
    const panel = document.querySelector(`[data-menu-panel="${key}"]`);
    const wasHidden = panel.classList.contains('hidden');
    document.querySelectorAll('[data-menu-panel]').forEach(p => p.classList.add('hidden'));
    if (wasHidden) panel.classList.remove('hidden');
  });
});
document.addEventListener('click', () => document.querySelectorAll('[data-menu-panel]').forEach(p => p.classList.add('hidden')));

/* 亮暗主题切换 */
function applyThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
    (!document.documentElement.hasAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.getElementById('iconSun').classList.toggle('hidden', isDark);
  document.getElementById('iconMoon').classList.toggle('hidden', !isDark);
}
document.getElementById('themeToggleBtn').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ittp:theme', next);
  applyThemeIcon();
});
(function initTheme() {
  const saved = localStorage.getItem('ittp:theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  applyThemeIcon();
})();

/* 浏览器前进/后退 */
window.addEventListener('popstate', () => {
  const idx = readUrlLocation();
  if (idx !== null && idx >= 0) {
    state.globalStepIndex = idx;
    renderStep();
  }
});

/* =========================================================================
   初始定位：URL 深链 > 历史进度 > 第一步
   ========================================================================= */
(function init() {
  const urlIdx = readUrlLocation();
  if (urlIdx !== null) {
    if (urlIdx >= 0) {
      state.globalStepIndex = urlIdx;
    } else {
      state.globalStepIndex = 0;
      showToast('该步骤不存在，已为您定位到第一步');
    }
  } else {
    const progress = readProgress();
    if (progress && progress.currentChapterId && progress.currentStepId) {
      const idx = findFlatIndexByIds(progress.currentChapterId, progress.currentStepId);
      if (idx > 0) {
        state.globalStepIndex = idx;
        const flat = flatSteps[idx];
        showToast('已为您定位到上次学习位置：' + flat.chapterTitle + ' · ' + flat.step.title);
      } else {
        state.globalStepIndex = 0;
      }
    } else {
      state.globalStepIndex = 0;
    }
  }
  const flat = flatSteps[state.globalStepIndex];
  writeUrlLocation(flat.chapterId, flat.step.id, true);
  renderStep();
  syncPaneVisibilityForBreakpoint();
})();
</script>
</body>
</html>
