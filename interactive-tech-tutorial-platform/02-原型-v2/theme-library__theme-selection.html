  :root[data-theme="dark"], html.dark {
    --color-bg: #0F172A;
    --color-surface: #1A2333;
    --color-border: #2A3548;
    --color-text: #E2E8F0;
    --color-text-muted: #94A3B8;

    :root:not([data-theme="light"]) {
      --color-bg: #0F172A;
      --color-surface: #1A2333;

      --color-text: #E2E8F0;

  ::-webkit-scrollbar { width: 8px; height: 8px; }

</style>

<main class="pt-28 lg:pt-14 lg:pl-56 min-h-screen">

<!-- Toast 提示（维护中/筹备中点击反馈） -->
<div id="toast" class="pointer-events-none fixed bottom-6 left-1/2 -translate-x-1/2 z-50 opacity-0 translate-y-2 transition-all duration-200">

<script>
/* ---------------------------------------------------------
 * 主题偏好（appearance-theme 模块约定，key: theme-preference）
 * --------------------------------------------------------- */
(function initTheme() {
  var stored = null;
  try { stored = JSON.parse(localStorage.getItem('theme-preference') || 'null'); } catch (e) {}
  var mode = stored && stored.mode ? stored.mode : 'system';
  function resolve(mode) {
    if (mode === 'dark') return 'dark';
    if (mode === 'light') return 'light';
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  function apply(mode) {
    var resolved = resolve(mode);
    document.documentElement.setAttribute('data-theme', resolved);
    document.documentElement.classList.toggle('dark', resolved === 'dark');
    document.getElementById('iconSun').classList.toggle('hidden', resolved !== 'dark');
    document.getElementById('iconMoon').classList.toggle('hidden', resolved === 'dark');
  }
  apply(mode);
  document.getElementById('themeToggle').addEventListener('click', function () {
    var current = resolve(mode);
    mode = current === 'dark' ? 'light' : 'dark';
    apply(mode);
    try {
      localStorage.setItem('theme-preference', JSON.stringify({ mode: mode, updatedAt: new Date().toISOString() }));
    } catch (e) {}
  });
})();

/* ---------------------------------------------------------
 * TutorialPackage 拟真数据（本模块只读消费，渲染逻辑不针对具体 id 写死分支）
 * --------------------------------------------------------- */
function makeSteps(chapterId, titles) {
  return titles.map(function (title, i) {
    return { id: chapterId + '-s' + (i + 1), title: title };
  });
}

var packages = [
  {
    id: 'react',
    meta: {
      title: 'React',
      description: '组件化 UI 开发与 Hooks 全解，从 JSX 渲染到路由与状态管理，62 篇实战笔记带你从零跑通完整应用。',
      language: 'jsx'
    },
    status: 'active',
    chapters: [
      { id: 'react-c1', title: 'JSX 基础与渲染', steps: makeSteps('react-c1', ['什么是 JSX', '在 JSX 中嵌入表达式', '条件渲染', '列表渲染与 key']) },
      { id: 'react-c2', title: '组件与 Props', steps: makeSteps('react-c2', ['函数组件与类组件', '组件的组合与拆分', 'Props 只读与单向数据流', 'children 与插槽式组合', 'PropTypes 与类型校验']) },
      { id: 'react-c3', title: 'State 与事件处理', steps: makeSteps('react-c3', ['useState 入门', '事件绑定与合成事件', '受控组件与表单', '状态提升', '不可变更新模式']) },
      { id: 'react-c4', title: 'Hooks 入门', steps: makeSteps('react-c4', ['useEffect 基础', '依赖数组与清理函数', 'useRef 与 DOM 引用', 'useMemo 性能优化', 'useCallback 与函数缓存', '自定义 Hook 入门', 'useContext 基础', 'Hooks 使用规则']) },
      { id: 'react-c5', title: 'Hooks 进阶', steps: makeSteps('react-c5', ['useReducer 状态管理', 'useLayoutEffect 场景', 'useImperativeHandle', 'forwardRef 转发引用', 'useTransition 并发特性', 'useDeferredValue', 'useId 生成稳定 ID', 'useSyncExternalStore', '组合式自定义 Hook 实战']) },
      { id: 'react-c6', title: 'Context 与状态管理', steps: makeSteps('react-c6', ['Context API 基础', '多层 Context 组合', 'useReducer + Context 模式', '何时引入 Redux / Zustand']) },
      { id: 'react-c7', title: 'React Router', steps: makeSteps('react-c7', ['路由基础与 BrowserRouter', 'Route 与 Routes 配置', '嵌套路由', '动态路由参数', 'useParams 使用', 'useNavigate 编程式跳转', 'Link 与 NavLink', '404 与通配路由', '路由懒加载', '受保护路由与鉴权', 'useSearchParams 查询参数', '路由级数据加载 loader', '路由动作 action', '错误边界 errorElement', '布局路由 Layout Route', '索引路由 Index Route', '相对路径与绝对路径', '路由重定向', '多级面包屑导航', '路由过渡动画', '代码分割与路由', '路由测试基础', '服务端渲染下的路由', 'React Router 最佳实践']) },
      { id: 'react-c8', title: '性能优化与测试', steps: makeSteps('react-c8', ['React.memo 与渲染优化', '使用 React DevTools 分析性能', '组件测试入门（Testing Library）']) }
    ]
  },
  {
    id: 'vue',
    meta: {
      title: 'Vue',
      description: '对标官方互动教程的 Vue3 版本，覆盖模板语法、Composition API 与 Pinia 状态管理。',
      language: 'vue'
    },
    status: 'active',
    chapters: [
      { id: 'vue-c1', title: '模板语法与响应式基础', steps: makeSteps('vue-c1', ['声明式渲染', '属性绑定 v-bind', '条件渲染 v-if', '列表渲染 v-for', '事件监听 v-on']) },
      { id: 'vue-c2', title: '组件与 Props', steps: makeSteps('vue-c2', ['组件注册与使用', 'Props 声明与传递', '组件事件 emit', '插槽 slot 基础']) },
      { id: 'vue-c3', title: '生命周期与 Computed', steps: makeSteps('vue-c3', ['生命周期钩子', '计算属性 computed', '侦听器 watch', '模板引用 ref']) },
      { id: 'vue-c4', title: 'Composition API', steps: makeSteps('vue-c4', ['setup 函数', 'reactive 与 ref', '组合式函数复用逻辑', 'provide / inject', 'script setup 语法糖']) },
      { id: 'vue-c5', title: '路由与状态管理', steps: makeSteps('vue-c5', ['Vue Router 基础', 'Pinia 状态管理入门']) }
    ]
  },
  {
    id: 'javascript',
    meta: {
      title: 'JavaScript',
      description: '从变量与类型到异步编程、模块化工程实践的 JavaScript 基础与进阶内容。',
      language: 'js'
    },
    status: 'maintenance',
    chapters: [
      { id: 'js-c1', title: '变量与类型', steps: makeSteps('js-c1', ['变量声明与作用域', '基本数据类型', '类型转换']) },
      { id: 'js-c2', title: '函数与作用域', steps: makeSteps('js-c2', ['函数声明与表达式', '闭包', 'this 指向', '箭头函数']) },
      { id: 'js-c3', title: '异步编程', steps: makeSteps('js-c3', ['回调与事件循环', 'Promise 基础', 'async/await', '并发控制', '错误处理模式']) },
      { id: 'js-c4', title: '模块化与工程化', steps: makeSteps('js-c4', ['ES Module', '打包工具基础', '代码规范与 lint']) }
    ]
  },
  {
    id: 'algorithm',
    meta: {
      title: '算法与数据结构',
      description: '面向前端工程师的算法与数据结构训练，内容正在筹备中。',
      language: 'js'
    },
    status: 'draft',
    chapters: []
  }
];

/* 派生 totalSteps，禁止针对具体 id 写死分支 */
packages.forEach(function (pkg) {
  pkg.totalSteps = pkg.chapters.reduce(function (sum, ch) { return sum + ch.steps.length; }, 0);
});

/* ---------------------------------------------------------
 * 学习进度（learning-progress 模块的 localStorage 契约，本模块只读）
 * key: ittp:progress -> { [tutorialId]: { currentStepId, completedStepIds, lastVisitedAt } }
 * 首次访问时为 React 主题植入一份演示进度，模拟"上次学到一半"
 * --------------------------------------------------------- */
var PROGRESS_KEY = 'ittp:progress';

function readAllProgress() {
  try {
    return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
  } catch (e) {
    return {};
  }
}

function writeAllProgress(all) {
  try {
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(all));
  } catch (e) { /* localStorage 不可用时静默降级，见业务规则 3.5/4 */ }
}

(function seedDemoProgressIfEmpty() {
  var all = readAllProgress();
  if (Object.keys(all).length > 0) return;
  // React：模拟已学到「Hooks 进阶」第 4 步（forwardRef 转发引用）
  var completed = [];
  ['react-c1', 'react-c2', 'react-c3', 'react-c4'].forEach(function (cid) {
    var ch = packages.find(function (p) { return p.id === 'react'; }).chapters.find(function (c) { return c.id === cid; });
    ch.steps.forEach(function (s) { completed.push(s.id); });
  });
  completed.push('react-c5-s1', 'react-c5-s2', 'react-c5-s3');
  all.react = {
    currentStepId: 'react-c5-s4',
    completedStepIds: completed,
    lastVisitedAt: new Date(Date.now() - 1000 * 60 * 60 * 26).toISOString()
  };
  writeAllProgress(all);
})();

function getProgress(tutorialId) {
  var all = readAllProgress();
  return all[tutorialId] || null;
}

/* ---------------------------------------------------------
 * 渲染：卡片列表（完全由 packages 数组驱动，无 if/switch 按 id 分支）
 * --------------------------------------------------------- */
var STATUS_META = {
  active: { label: '可学习', badge: 'bg-primary-50 text-primary-700 dark:bg-primary-500/15 dark:text-primary-300' },
  maintenance: { label: '维护中', badge: 'bg-amber-50 text-amber-700 dark:bg-amber-500/10 dark:text-amber-400' },
  draft: { label: '内容筹备中', badge: 'bg-slate-100 text-slate-500 dark:bg-white/5 dark:text-slate-400' }
};

function firstStepId(pkg) {
  var firstChapter = pkg.chapters.find(function (c) { return c.steps.length > 0; });
  return firstChapter ? firstChapter.steps[0].id : null;
}

function renderSummary() {
  var total = packages.length;
  var activeCount = packages.filter(function (p) { return p.status === 'active'; }).length;
  var totalStepsAll = packages.reduce(function (s, p) { return s + p.totalSteps; }, 0);
  var completedAll = packages.reduce(function (s, p) {
    var prog = getProgress(p.id);
    return s + (prog ? prog.completedStepIds.length : 0);
  }, 0);
  document.getElementById('summaryBar').innerHTML =
    '<span><strong class="text-[var(--color-text)] font-semibold">' + total + '</strong> 个主题</span>' +
    '<span><strong class="text-[var(--color-text)] font-semibold">' + activeCount + '</strong> 个可学习</span>' +
    '<span>累计已学 <strong class="text-[var(--color-text)] font-semibold">' + completedAll + '</strong> / ' + totalStepsAll + ' 步</span>';
}

function renderCard(pkg) {
  var meta = STATUS_META[pkg.status];
  var isActive = pkg.status === 'active';
  var chaptersEmpty = pkg.chapters.length === 0;
  var prog = isActive ? getProgress(pkg.id) : null;
  var completedCount = prog ? prog.completedStepIds.length : 0;
  var percent = pkg.totalSteps > 0 ? Math.floor((completedCount / pkg.totalSteps) * 100) : 0;
  var isDone = pkg.totalSteps > 0 && completedCount >= pkg.totalSteps;

  var ctaLabel = !isActive ? (chaptersEmpty ? '内容筹备中' : '维护中，暂不可用')
    : isDone ? '重新学习'
    : prog ? '继续学习'
    : '开始学习';

  var disabledCls = isActive ? '' : 'opacity-60';
  var cardTag = isActive ? 'button' : 'button';

  var progressBar = isActive ? (
    '<div class="mt-4">' +
      '<div class="flex items-center justify-between text-xs text-[var(--color-text-muted)] mb-1.5">' +
        '<span>已完成 ' + completedCount + ' / ' + pkg.totalSteps + ' 步</span>' +
        '<span class="font-medium ' + (isDone ? 'text-accent-600 dark:text-accent-400' : 'text-[var(--color-text)]') + '">' + percent + '%</span>' +
      '</div>' +
      '<div class="h-1.5 rounded-full bg-slate-100 dark:bg-white/5 overflow-hidden">' +
        '<div class="h-full rounded-full ' + (isDone ? 'bg-accent-500' : 'bg-primary-500') + '" style="width:' + percent + '%"></div>' +
      '</div>' +
    '</div>'
  ) : (
    '<div class="mt-4 flex items-center gap-1.5 text-xs text-[var(--color-text-muted)]">' +
      '<svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>' +
      (chaptersEmpty ? '暂无章节内容' : '当前不可进入，敬请等待恢复') +
    '</div>'
  );

  return (
    '<' + cardTag + ' type="button" data-pkg="' + pkg.id + '" ' +
    'class="pkg-card text-left group relative surface rounded-xl p-5 flex flex-col shadow-sm transition-shadow ' +
    (isActive ? 'hover:shadow-md hover:border-primary-300 dark:hover:border-primary-500/40 cursor-pointer' : 'cursor-not-allowed ' + disabledCls) + '">' +
      '<div class="flex items-start justify-between gap-3">' +
        '<h3 class="text-base font-semibold text-[var(--color-text)]">' + pkg.meta.title + '</h3>' +
        '<span class="shrink-0 inline-flex items-center h-6 px-2 rounded-lg text-xs font-medium ' + meta.badge + '">' + meta.label + '</span>' +
      '</div>' +
      '<p class="mt-2 text-sm text-[var(--color-text-muted)] leading-relaxed line-clamp-2">' + (pkg.meta.description || '暂无简介') + '</p>' +
      '<div class="mt-4 flex items-center gap-4 text-xs text-[var(--color-text-muted)]">' +
        '<span class="inline-flex items-center gap-1"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M4 9h16"/></svg>' + pkg.chapters.length + ' 章节</span>' +
        '<span class="inline-flex items-center gap-1"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>' + pkg.totalSteps + ' 步骤</span>' +
      '</div>' +
      progressBar +
      '<div class="mt-5 pt-4 border-t border-[var(--color-border)] flex items-center justify-between">' +
        '<span class="text-xs text-[var(--color-text-muted)] font-mono">' + pkg.id + '</span>' +
        '<span class="inline-flex items-center h-9 px-3.5 rounded-lg text-sm font-medium ' +
          (isActive ? 'bg-primary-500 text-white group-hover:bg-primary-600' : 'bg-slate-200 text-slate-500 dark:bg-white/10 dark:text-slate-400') + '">' +
          ctaLabel +
          (isActive ? '<svg class="w-3.5 h-3.5 ml-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>' : '') +
        '</span>' +
      '</div>' +
    '</' + cardTag + '>'
  );
}

function showToast(text) {
  var toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = text;
  toast.classList.remove('opacity-0', 'translate-y-2');
  toast.classList.add('opacity-100', 'translate-y-0');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function () {
    toast.classList.add('opacity-0', 'translate-y-2');
    toast.classList.remove('opacity-100', 'translate-y-0');
  }, 2400);
}

function handleCardClick(pkg) {
  if (pkg.status === 'maintenance') {
    showToast('「' + pkg.meta.title + '」正在维护中，暂不可进入');
    return;
  }
  if (pkg.status === 'draft' || pkg.chapters.length === 0) {
    showToast('「' + pkg.meta.title + '」内容筹备中，敬请期待');
    return;
  }
  var prog = getProgress(pkg.id);
  var targetStep = (prog && prog.currentStepId) ? prog.currentStepId : firstStepId(pkg);
  if (!targetStep) {
    showToast('「' + pkg.meta.title + '」暂无可学习的步骤');
    return;
  }
  window.location.href = 'learning-workspace__workspace.html?tutorial=' + encodeURIComponent(pkg.id) + '&step=' + encodeURIComponent(targetStep);
}

function renderSkeleton() {
  var html = '';
  for (var i = 0; i < 4; i++) {
    html += '<div class="surface rounded-xl p-5 shadow-sm animate-pulse">' +
      '<div class="h-4 w-24 bg-slate-200 dark:bg-white/10 rounded"></div>' +
      '<div class="h-3 w-full bg-slate-100 dark:bg-white/5 rounded mt-3"></div>' +
      '<div class="h-3 w-2/3 bg-slate-100 dark:bg-white/5 rounded mt-2"></div>' +
      '<div class="h-1.5 w-full bg-slate-100 dark:bg-white/5 rounded mt-6"></div>' +
      '<div class="h-9 w-full bg-slate-100 dark:bg-white/5 rounded-lg mt-5"></div>' +
    '</div>';
  }
  document.getElementById('skeletonGrid').innerHTML = html;
}

function renderGrid() {
  var grid = document.getElementById('cardGrid');
  grid.innerHTML = packages.map(renderCard).join('');
  grid.querySelectorAll('.pkg-card').forEach(function (el) {
    var pkg = packages.find(function (p) { return p.id === el.getAttribute('data-pkg'); });
    el.addEventListener('click', function () { handleCardClick(pkg); });
  });
}

renderSummary();
renderSkeleton();
setTimeout(function () {
  document.getElementById('skeletonGrid').classList.add('hidden');
  document.getElementById('cardGrid').classList.remove('hidden');
  renderGrid();
}, 420);
</script>
</body>
</html>
